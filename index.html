<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 3px solid #fbbf24; background-color: #f0fff4; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white p-4 shadow-xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-12 w-12 rounded-full border-2 border-white bg-white">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter">INFOPORCO</h1>
            </div>
            <div class="flex items-center space-x-4 text-sm font-bold">
                <span class="bg-yellow-500 text-green-900 px-2 py-1 rounded uppercase">Live Feed</span>
                <p id="clock" class="font-mono opacity-80"></p>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-6 px-4">
        
        <section class="mb-8 bg-white p-6 rounded-2xl card-shadow">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-palmeiras uppercase italic mb-4 md:mb-0">
                    <i class="fas fa-history mr-2"></i> Linha do Tempo de Jogos
                </h2>
                <div class="flex items-center space-x-2 bg-gray-100 px-4 py-2 rounded-full shadow-inner">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Últimos 8:</span>
                    <span class="w-3.5 h-3.5 rounded-full bg-red-600" title="Derrota"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-yellow-400" title="Empate"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                    <span class="w-3.5 h-3.5 rounded-full bg-green-600" title="Vitória"></span>
                </div>
            </div>

            <div id="match-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-4 text-white flex justify-between items-center">
                    <h2 class="font-bold uppercase italic tracking-wider text-sm">TV Palmeiras</h2>
                    <i class="fab fa-youtube text-xl"></i>
                </div>
                <div id="youtube-feed" class="p-4 space-y-4 max-h-[500px] overflow-y-auto"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-4 text-white flex justify-between items-center">
                    <h2 class="font-bold uppercase italic tracking-wider text-sm">Instagram Feed</h2>
                    <i class="fab fa-instagram text-xl"></i>
                </div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-2 p-4"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
                    <h2 class="font-bold text-palmeiras uppercase italic tracking-wider text-sm">Radar (15 Dias)</h2>
                    <i class="fas fa-newspaper text-palmeiras"></i>
                </div>
                <div id="news-feed" class="p-4 space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        // YouTube
        fetch(apiYoutube).then(res => res.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            data.slice(0, 5).forEach(video => {
                container.innerHTML += `
                    <a href="${video.url}" target="_blank" class="block group border-b pb-2 mb-2 last:border-0">
                        <img src="${video.thumbnailUrl}" class="rounded-lg w-full mb-2">
                        <h3 class="font-bold text-xs group-hover:text-red-600">${video.title}</h3>
                    </a>`;
            });
        });

        // Instagram com Fallback
        fetch(apiInstagram).then(res => res.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            data.slice(0, 4).forEach(post => {
                container.innerHTML += `
                    <a href="${post.url}" target="_blank" class="aspect-square rounded-lg overflow-hidden bg-gray-100">
                        <img src="${post.displayUrl}" class="w-full h-full object-cover" onerror="this.src='./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png'; this.style.padding='10px';">
                    </a>`;
            });
        });

        // Calendário - Coluna Única
        function loadMatches() {
            const container = document.getElementById('match-list');
            const matches = [
                { d: "01/02", op: "Botafogo-SP", p: "1 x 0", res: "🔴", st: "Santa Cruz" },
                { d: "04/02", op: "Vitória", p: "5 x 1", res: "🟢", st: "Barueri" },
                { d: "08/02", op: "Corinthians", p: "0 x 1", res: "🟢", st: "Neo Química" },
                { d: "12/02", op: "Internacional", p: "1 x 3", res: "🟢", st: "Beira-Rio" },
                { d: "15/02", op: "Guarani", p: "1 x 1", res: "🟡", st: "Barueri" },
                { d: "21/02", op: "Capivariano", p: "4 x 0", res: "🟢", st: "Barueri" },
                { d: "25/02", op: "Fluminense", p: "2 x 1", res: "🟢", st: "Barueri" },
                { d: "01/03", op: "São Paulo", p: "2 x 1", res: "🟢", st: "Allianz" },
                { d: "04/03", op: "Novorizontino", p: "X", res: "PRÓX", st: "Barueri", prox: true, logo: "https://upload.wikimedia.org/wikipedia/pt/8/89/Gremio_Novorizontino_SP.png" }
            ];

            matches.forEach(m => {
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 rounded-xl border ${m.prox ? 'next-game-active shadow-md' : 'bg-gray-50 border-gray-200'}">
                        <div class="flex items-center space-x-4">
                            <span class="text-xs font-bold text-gray-400">${m.d}</span>
                            <div class="flex items-center space-x-2">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-6 w-6">
                                <span class="text-lg font-black">${m.p}</span>
                                ${m.prox ? `<img src="${m.logo}" class="h-6 w-6">` : `<span class="text-xs font-bold text-gray-500 italic">${m.op}</span>`}
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">${m.st}</p>
                            <span class="text-[10px] px-2 py-0.5 rounded font-black ${m.prox ? 'bg-palmeiras text-white animate-pulse' : 'bg-white text-gray-600 border'}">${m.res}</span>
                        </div>
                    </div>`;
            });
            // Auto-scroll para o final da lista (onde está o próximo jogo)
            container.scrollTop = container.scrollHeight;
        }

        // Radar de Notícias
        function loadNews() {
            const container = document.getElementById('news-feed');
            const news = [
                { t: "Escalação: Abel mantém mistério para a final.", s: "GE", d: "04/03" },
                { t: "Arena Barueri recebe últimos ajustes para decisão.", s: "UOL", d: "03/03" },
                { t: "Palmeiras renova com destaque da base até 2029.", s: "Lance", d: "02/03" }
            ];
            news.forEach(n => {
                container.innerHTML += `
                    <div class="border-b pb-2 group cursor-pointer">
                        <div class="flex justify-between text-[10px] mb-1">
                            <span class="font-bold text-palmeiras">${n.s}</span>
                            <span class="text-gray-400">${n.d}</span>
                        </div>
                        <p class="text-xs font-semibold group-hover:text-green-700">${n.t}</p>
                    </div>`;
            });
        }

        loadMatches();
        loadNews();
    </script>
</body>
</html>

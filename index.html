<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Porco | Dashboard Palmeiras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 3px solid #006437; background-color: #f0fff4; transform: scale(1.05); z-index: 10; }
        .logo-header { height: 60px; width: auto; object-fit: contain; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white p-4 shadow-xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="https://i.ibb.co/XfXkY0p/ChatGPT-Image-Mar-4-2026-03-19-20-PM.jpg" alt="Logo Info Porco" class="logo-header rounded-full">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter">INFO PORCO</h1>
            </div>
            <div class="text-right">
                <p id="clock" class="text-sm font-mono opacity-80"></p>
                <span class="bg-yellow-500 text-green-900 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">Feed Atualizado</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-6 px-4">
        
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow relative overflow-hidden">
            <div class="flex items-center mb-6 space-x-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-6 w-6">
                <h2 class="text-xl font-bold text-palmeiras uppercase tracking-tight italic">Linha do Tempo: Últimos Jogos + Próximo</h2>
            </div>
            
            <button onclick="scrollCarousel(-300)" class="absolute left-2 top-[60%] -translate-y-1/2 z-20 bg-white/90 shadow-lg rounded-full p-3 text-palmeiras hover:bg-palmeiras hover:text-white transition">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button onclick="scrollCarousel(300)" class="absolute right-2 top-[60%] -translate-y-1/2 z-20 bg-white/90 shadow-lg rounded-full p-3 text-palmeiras hover:bg-palmeiras hover:text-white transition">
                <i class="fas fa-chevron-right"></i>
            </button>

            <div id="match-carousel" class="flex overflow-x-auto space-x-6 pb-6 pt-2 no-scrollbar snap-x scroll-smooth px-4">
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-4 flex justify-between items-center text-white">
                    <h2 class="font-bold uppercase italic tracking-wider flex items-center">TV Palmeiras <i class="fab fa-youtube ml-2"></i></h2>
                </div>
                <div id="youtube-feed" class="p-4 space-y-4 max-h-[650px] overflow-y-auto"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-4 flex justify-between items-center text-white">
                    <h2 class="font-bold uppercase italic tracking-wider flex items-center">Instagram Feed <i class="fab fa-instagram ml-2"></i></h2>
                </div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-2 p-4 max-h-[650px] overflow-y-auto"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
                    <h2 class="font-bold text-palmeiras uppercase italic tracking-wider text-sm">Radar (Últimos 15 dias)</h2>
                    <i class="fas fa-calendar-check text-palmeiras text-xl"></i>
                </div>
                <div id="news-feed" class="p-4 space-y-4 max-h-[650px] overflow-y-auto"></div>
            </section>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        fetch(apiYoutube).then(res => res.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            container.innerHTML = '';
            data.slice(0, 6).forEach(video => {
                container.innerHTML += `
                    <a href="${video.url}" target="_blank" class="block group border-b pb-3 mb-3 last:border-0">
                        <img src="${video.thumbnailUrl}" class="rounded-lg w-full group-hover:opacity-80 transition shadow-sm border">
                        <h3 class="font-bold text-sm mt-2 leading-tight group-hover:text-red-600">${video.title}</h3>
                    </a>`;
            });
        });

        fetch(apiInstagram).then(res => res.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            container.innerHTML = '';
            // Filtro rigoroso para mostrar 8 imagens válidas
            data.filter(post => post.displayUrl && post.displayUrl.includes('http')).slice(0, 8).forEach(post => {
                container.innerHTML += `
                    <a href="${post.url}" target="_blank" class="aspect-square rounded-lg overflow-hidden border group bg-gray-100">
                        <img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.parentElement.style.display='none'">
                    </a>`;
            });
        });

        function loadNews() {
            const container = document.getElementById('news-feed');
            const fifteenDaysAgo = new Date();
            fifteenDaysAgo.setDate(fifteenDaysAgo.getDate() - 15);

            const newsData = [
                { date: "2026-03-04", source: "GE", text: "Decisão no Porco: Veja a provável escalação para o jogo contra o Novorizontino.", url: "#" },
                { date: "2026-03-03", source: "GAZETA", text: "Novo reforço do Palmeiras já está no BID e pode estrear na final.", url: "#" },
                { date: "2026-03-02", source: "UOL", text: "Abel Ferreira completa 4 anos de clube e recebe homenagem da diretoria.", url: "#" },
                { date: "2026-02-27", source: "GE", text: "Palmeiras monitora situação de Jhon Arias para janela de meio de ano.", url: "#" },
                { date: "2026-02-20", source: "LANCE", text: "Análise: A evolução tática do Verdão no campeonato Paulista.", url: "#" }
            ];

            const filtered = newsData
                .filter(n => new Date(n.date) >= fifteenDaysAgo)
                .sort((a, b) => new Date(b.date) - new Date(a.date)); // Mais recente no TOPO

            container.innerHTML = '';
            filtered.forEach(n => {
                const formattedDate = new Date(n.date).toLocaleDateString('pt-BR');
                container.innerHTML += `
                    <div class="border-b pb-3 group cursor-pointer hover:bg-green-50 p-2 rounded transition">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-bold text-white bg-palmeiras px-2 py-0.5 rounded uppercase">${n.source}</span>
                            <span class="text-[9px] text-gray-400 font-bold">${formattedDate}</span>
                        </div>
                        <p class="font-semibold text-sm leading-snug text-gray-800 group-hover:text-green-800">${n.text}</p>
                    </div>`;
            });
        }

        function loadMatches() {
            const carousel = document.getElementById('match-carousel');
            const matches = [
                { data: "01/02", comp: "Paulista", op: "Botafogo-SP", logo: "https://upload.wikimedia.org/wikipedia/pt/d/d3/Botafogo_FC_SP.png", placar: "1 x 0", res: "D", local: "Santa Cruz" },
                { data: "04/02", comp: "Brasileirão", op: "Vitória", logo: "https://upload.wikimedia.org/wikipedia/pt/b/bc/ECVitoria_2016.png", placar: "5 x 1", res: "V", local: "Arena Barueri" },
                { data: "08/02", comp: "Paulista", op: "Corinthians", logo: "https://upload.wikimedia.org/wikipedia/pt/b/b4/Corinthians_simbolo.png", placar: "0 x 1", res: "V", local: "Neo Química Arena" },
                { data: "12/02", comp: "Brasileirão", op: "Internacional", logo: "https://upload.wikimedia.org/wikipedia/commons/f/f1/Escudo_do_Sport_Club_Internacional.svg", placar: "1 x 3", res: "V", local: "Beira-Rio" },
                { data: "15/02", comp: "Paulista", op: "Guarani", logo: "https://upload.wikimedia.org/wikipedia/pt/3/38/Guarani_Futebol_Clube.png", placar: "1 x 1", res: "E", local: "Arena Barueri" },
                { data: "21/02", comp: "Paulista", op: "Capivariano", logo: "https://upload.wikimedia.org/wikipedia/pt/0/03/Capivariano_Futebol_Clube.png", placar: "4 x 0", res: "V", local: "Arena Barueri" },
                { data: "25/02", comp: "Brasileirão", op: "Fluminense", logo: "https://upload.wikimedia.org/wikipedia/pt/a/a8/Fluminense_FC_escudo.png", placar: "2 x 1", res: "V", local: "Arena Barueri" },
                { data: "01/03", comp: "Paulista", op: "São Paulo", logo: "https://upload.wikimedia.org/wikipedia/pt/4/4b/S%C3%A3o_Paulo_Futebol_Clube.png", placar: "2 x 1", res: "V", local: "Arena Barueri" },
                { data: "04/03", comp: "Paulista", op: "Novorizontino", logo: "https://upload.wikimedia.org/wikipedia/pt/8/89/Gremio_Novorizontino_SP.png", placar: "X", res: "NEXT", local: "Arena Barueri", prox: true }
            ];

            carousel.innerHTML = '';
            matches.forEach(m => {
                const resColor = m.res === 'V' ? 'bg-green-600' : m.res === 'D' ? 'bg-red-600' : 'bg-gray-500';
                carousel.innerHTML += `
                    <div ${m.prox ? 'id="next-match"' : ''} class="min-w-[260px] snap-center p-5 rounded-2xl border-2 ${m.prox ? 'next-game-active shadow-xl' : 'bg-white border-gray-100'}">
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-3">
                            <span>${m.data}</span>
                            <span>${m.comp.toUpperCase()}</span>
                        </div>
                        <div class="flex items-center justify-between mb-4">
                            <div class="text-center w-1/3">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-10 mx-auto">
                                <p class="text-[9px] mt-1 font-bold text-palmeiras italic">SEP</p>
                            </div>
                            <div class="text-xl font-black text-gray-800">${m.placar}</div>
                            <div class="text-center w-1/3">
                                <img src="${m.logo}" class="h-10 mx-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=Logo'">
                                <p class="text-[9px] mt-1 font-bold text-gray-500 italic">${m.op.substring(0,3).toUpperCase()}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-gray-100">
                            <span class="text-[10px] text-gray-400 italic"><i class="fas fa-location-dot"></i> ${m.local}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded text-white font-bold ${m.prox ? 'bg-palmeiras animate-pulse' : resColor}">${m.res === 'NEXT' ? 'PRÓXIMO' : 'RESULTADO'}</span>
                        </div>
                    </div>`;
            });

            setTimeout(() => {
                const nextMatch = document.getElementById('next-match');
                if (nextMatch) nextMatch.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }, 1000);
        }

        function scrollCarousel(dist) {
            document.getElementById('match-carousel').scrollBy({ left: dist, behavior: 'smooth' });
        }

        loadMatches();
        loadNews();
    </script>
</body>
</html>

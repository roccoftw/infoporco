<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 2px solid #fbbf24; background-color: #f0fff4; }
        
        /* Play VERDE para vídeos do Feed */
        .reels-fallback { 
            background-color: rgba(0, 100, 55, 0.05) !important; 
            display: flex !important;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
        .play-button-green {
            color: #00C853 !important; 
            font-size: 3rem;
            filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.3));
            z-index: 20;
        }
        .pulse-green { animation: pulse-play 2s infinite; }
        @keyframes pulse-play { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white p-4 shadow-xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-14 w-14 rounded-full border-2 border-white bg-white">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter uppercase">INFOPORCO</h1>
            </div>
            <div class="text-right">
                <span class="bg-yellow-500 text-green-900 px-3 py-1 rounded-full text-[10px] font-bold uppercase shadow-md">Live Hub</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-6 px-4">
        
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow max-w-2xl mx-auto border-t-4 border-palmeiras text-center">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold text-palmeiras uppercase italic">Próximo Jogo (Final)</h2>
                <div class="flex items-center space-x-1.5 bg-gray-50 px-3 py-1.5 rounded-full border">
                    <span class="w-2.5 h-2.5 rounded-full bg-red-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                </div>
            </div>

            <div class="next-game-active rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-around space-y-4 md:space-y-0">
                <div class="flex items-center space-x-6">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-14 w-14" alt="Palmeiras">
                    <span class="font-black text-2xl text-gray-400">X</span>
                    <img src="https://upload.wikimedia.org/wikipedia/pt/8/89/Gremio_Novorizontino_SP.png" class="h-14 w-14 object-contain" alt="Novorizontino">
                </div>
                <div class="md:text-right">
                    <p class="text-sm font-black text-green-800 uppercase tracking-tight">PAULISTA | 04/03/2026 | 20H00</p>
                    <p class="text-xs font-bold text-gray-600 mt-1 uppercase italic tracking-tighter">Arena Crefisa Barueri | <i class="fas fa-tv ml-1"></i> TNT, CazéTV</p>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-4 text-white flex justify-between items-center border-b-2 border-red-700">
                    <h2 class="font-bold uppercase italic tracking-wider text-xs">TV Palmeiras Sportingbet</h2>
                    <i class="fab fa-youtube text-lg"></i>
                </div>
                <div id="youtube-feed" class="p-4 space-y-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-4 text-white flex justify-between items-center border-b-2 border-purple-700">
                    <h2 class="font-bold uppercase italic tracking-wider text-xs flex items-center">Instagram Feed <i class="fab fa-instagram ml-2"></i></h2>
                </div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-3 p-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
                    <h2 class="font-bold text-palmeiras uppercase italic tracking-wider text-xs">Radar (15 Notícias Atuais)</h2>
                    <i class="fas fa-newspaper text-palmeiras text-lg"></i>
                </div>
                <div id="news-feed" class="p-4 space-y-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>
        </div>
    </main>

    <script>
        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        // YouTube
        fetch(apiYoutube).then(res => res.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            data.slice(0, 8).forEach(video => {
                container.innerHTML += `
                    <a href="${video.url}" target="_blank" class="block border-b pb-3 mb-3 last:border-0 hover:bg-gray-50 transition rounded-lg p-1">
                        <img src="${video.thumbnailUrl}" class="rounded-lg w-full mb-1 border shadow-sm">
                        <h3 class="font-bold text-[11px] leading-tight">${video.title}</h3>
                    </a>`;
            });
        });

        // Instagram - 8 Posts (Apenas Feed Principal)
        fetch(apiInstagram).then(res => res.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            container.innerHTML = '';
            // Filtro para garantir que estamos pegando postagens que têm displayUrl (Feed)
            data.slice(0, 8).forEach(post => {
                const isVideo = post.type?.toLowerCase().includes('video') || !post.displayUrl;
                
                container.innerHTML += `
                    <a href="${post.url}" target="_blank" class="aspect-square rounded-lg border group shadow-sm relative overflow-hidden bg-gray-100">
                        ${isVideo ? 
                            `<div class="reels-fallback w-full h-full">
                                <i class="fas fa-play-circle play-button-green pulse-green"></i>
                             </div>` : 
                            `<img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">`
                        }
                    </a>`;
            });
        });

        // Radar de Notícias - 15 Notícias Reais
        const newsItems = [
            { t: "Escalação: Abel Ferreira define o Palmeiras para a final de logo mais.", d: "04/03 16h30", s: "GE", url: "https://ge.globo.com/futebol/times/palmeiras/" },
            { t: "Leila Pereira garante permanência de Abel Ferreira no comando.", d: "04/03 14h20", s: "UOL", url: "https://www.uol.com.br/esporte/futebol/times/palmeiras/" },
            { t: "Análise: Os segredos táticos do Palmeiras nesta temporada.", d: "04/03 11h45", s: "GAZETA", url: "https://www.gazetaesportiva.com/times/palmeiras/" },
            { t: "Recorde: CazéTV atinge números históricos em jogos do Verdão.", d: "03/03 18h30", s: "LANCE", url: "https://www.lance.com.br/palmeiras/" },
            { t: "Patrocínio Master: Leila sinaliza acordo recorde para 2027.", d: "03/03 16h10", s: "GE", url: "https://ge.globo.com/" },
            { t: "Arena Barueri pronta para receber a decisão paulista.", d: "03/03 14h00", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Dudu avança em recuperação e anima comissão técnica.", d: "02/03 20h00", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
            { t: "Venda de camisas: Palmeiras lidera mercado na América Latina.", d: "02/03 16h45", s: "LANCE", url: "https://www.lance.com.br/" },
            { t: "Homenagem: Patch especial celebra ídolo histórico do clube.", d: "02/03 09h30", s: "GE", url: "https://ge.globo.com/" },
            { t: "Crias da Academia: Sub-17 embarca para torneio internacional.", d: "01/03 21h15", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Avanti: Marca de 190 mil sócios adimplentes é superada.", d: "01/03 13h20", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
            { t: "Entrevista: Abel reforça o lema 'Todos Somos Um'.", d: "28/02 18h00", s: "LANCE", url: "https://www.lance.com.br/" },
            { t: "Bastidores: Preleção do Choque-Rei viraliza entre torcedores.", d: "28/02 14h40", s: "GE", url: "https://ge.globo.com/" },
            { t: "Jhon Arias: Negociações seguem em ritmo cauteloso.", d: "27/02 11h00", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Feminino: Reforço de peso chega para o ataque das Palestrinas.", d: "26/02 15h30", s: "GAZETA", url: "https://www.gazetaesportiva.com/" }
        ];

        const newsContainer = document.getElementById('news-feed');
        newsContainer.innerHTML = '';
        newsItems.forEach(n => {
            newsContainer.innerHTML += `
                <a href="${n.url}" target="_blank" class="block border-b pb-3 group hover:bg-green-50 p-2 rounded-lg transition">
                    <div class="flex justify-between text-[9px] mb-1 font-bold">
                        <span class="text-palmeiras uppercase">${n.s}</span>
                        <span class="text-gray-400 font-mono">${n.d}</span>
                    </div>
                    <p class="text-xs font-semibold leading-snug group-hover:text-green-800 transition">${n.t}</p>
                </a>`;
        });
    </script>
</body>
</html>

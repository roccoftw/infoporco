<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 2px solid #fbbf24; background-color: #f0fff4; }
        .tab-btn { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #fbbf24; color: #fbbf24; font-weight: 900; }
        
        /* Tooltip de TV */
        .tv-tooltip {
            visibility: hidden; width: 180px; background-color: #1a1a1a; color: #fff;
            text-align: center; border-radius: 6px; padding: 10px; position: absolute;
            z-index: 100; bottom: 125%; left: 50%; margin-left: -90px; opacity: 0;
            transition: opacity 0.3s; font-size: 11px; box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .tv-container:hover .tv-tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-3 border-b border-white/10">
                <div class="flex items-center space-x-3">
                    <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-12 w-12 rounded-full border-2 border-white bg-white">
                    <h1 class="text-xl md:text-2xl font-black italic tracking-tighter uppercase">INFOPORCO</h1>
                </div>
                <div class="text-right">
                    <p id="clock" class="font-mono text-[10px] opacity-70 italic"></p>
                </div>
            </div>
            <nav class="flex space-x-8 mt-2">
                <button onclick="switchTab('home')" id="btn-home" class="tab-btn active py-3 text-sm uppercase font-bold">Home</button>
                <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn py-3 text-sm uppercase font-bold">Calendário</button>
            </nav>
        </div>
    </header>

    <main id="tab-home" class="container mx-auto py-6 px-4">
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow max-w-2xl mx-auto border-t-4 border-palmeiras">
            <div class="flex items-center justify-between mb-6 text-lg font-bold text-palmeiras uppercase italic">
                <h2><i class="fas fa-calendar-star mr-2"></i> Próxima Decisão</h2>
                <div class="flex space-x-1"><span class="w-2.5 h-2.5 rounded-full bg-red-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span></div>
            </div>

            <div class="next-game-active rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center space-x-6">
                    <div class="text-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-14 w-14">
                        <p class="text-[9px] font-black text-palmeiras italic uppercase mt-1">SEP</p>
                    </div>
                    <span class="font-black text-2xl text-gray-400 italic">X</span>
                    <div class="text-center">
                        <img src="./Grêmio_Novorizontino.svg.webp" class="h-14 w-14 object-contain" alt="Logo Novorizontino">
                        <p class="text-[9px] font-black text-gray-600 italic uppercase mt-1">NOV</p>
                    </div>
                </div>

                <div class="text-center md:text-right">
                    <div class="text-sm font-black text-green-800 uppercase tracking-tight">PAULISTA | 04/03/2026 | 20H00</div>
                    <div class="text-xs font-bold text-gray-600 mt-2 flex items-center justify-center md:justify-end">
                        <span class="bg-green-100 text-green-800 px-2 py-1 rounded mr-3 uppercase italic">Arena Barueri</span>
                        <div class="tv-container relative inline-block">
                            <i class="fas fa-tv text-gray-400 hover:text-palmeiras cursor-help transition text-xl"></i>
                            <div class="tv-tooltip"><b>ONDE ASSISTIR:</b><br>Record, CazéTV, Paulistão Play e TNT.</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-4 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-xs">TV Palmeiras</h2><i class="fab fa-youtube text-lg"></i></div>
                <div id="youtube-feed" class="p-4 space-y-4 max-h-[850px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-4 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-xs">Instagram Feed</h2><i class="fab fa-instagram text-lg"></i></div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-3 p-4 max-h-[850px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-4 flex justify-between items-center bg-gray-50 border-b"><h2 class="font-bold text-palmeiras uppercase italic text-xs">Radar (15 Notícias)</h2><i class="fas fa-newspaper"></i></div>
                <div id="news-feed" class="p-4 space-y-4 max-h-[850px] overflow-y-auto no-scrollbar"></div>
            </section>
        </div>
    </main>

    <main id="tab-calendar" class="container mx-auto py-6 px-4 hidden">
        <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras max-w-4xl mx-auto">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center"><h2 class="text-2xl font-black text-palmeiras uppercase italic">Temporada 2026</h2></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[10px] uppercase font-bold"><tr><th class="px-6 py-4">Data</th><th class="px-6 py-4">Comp.</th><th class="px-6 py-4">Confronto</th><th class="px-6 py-4">Placar</th><th class="px-6 py-4">Local</th></tr></thead>
                    <tbody id="calendar-body" class="divide-y divide-gray-100 text-sm italic"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        function switchTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-calendar').classList.toggle('hidden', t !== 'calendar');
            document.getElementById('btn-home').classList.toggle('active', t === 'home');
            document.getElementById('btn-calendar').classList.toggle('active', t === 'calendar');
        }

        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); }, 1000);

        // YouTube
        fetch(apiYoutube).then(r => r.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            data.slice(0, 8).forEach(v => {
                container.innerHTML += `<a href="${v.url}" target="_blank" class="block border-b pb-3 mb-3 last:border-0 hover:bg-gray-50 transition p-2 rounded-xl"><img src="${v.thumbnailUrl}" class="rounded-lg w-full mb-2 shadow-sm border"><h3 class="font-bold text-[11px] leading-tight group-hover:text-red-600">${v.title}</h3></a>`;
            });
        });

        // Instagram - 8 Mais Recentes de FEED com imagem de pré-visualização
        fetch(apiInstagram).then(r => r.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            container.innerHTML = '';
            // Filtro rigoroso: garante que o post tem imagem de exibição e não é vídeo curto sem capa
            data.filter(post => post.displayUrl && post.displayUrl.includes('http')).slice(0, 8).forEach(post => {
                container.innerHTML += `<a href="${post.url}" target="_blank" class="aspect-square rounded-xl overflow-hidden border group bg-gray-100 shadow-sm relative"><img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500"></a>`;
            });
        });

        // Radar de Notícias - 15 Manchetes Reais
        const newsItems = [
            { t: "Escalação: Abel Ferreira define o Palmeiras para a grande final.", d: "04/03 16h10", s: "GE", url: "https://ge.globo.com/futebol/times/palmeiras/" },
            { t: "Leila Pereira garante permanência de Abel no comando para 2026.", d: "04/03 14h20", s: "UOL", url: "https://www.uol.com.br/esporte/futebol/times/palmeiras/" },
            { t: "Análise: O peso tático de Veiga na decisão do Paulistão.", d: "04/03 11h45", s: "GAZETA", url: "https://www.gazetaesportiva.com/times/palmeiras/" },
            { t: "CazéTV bate recorde de audiência em jogos do Verdão.", d: "03/03 18h30", s: "LANCE", url: "https://www.lance.com.br/palmeiras/" },
            { t: "Novo Mundial: FIFA confirma Palmeiras como cabeça de chave.", d: "03/03 15h05", s: "GE", url: "https://ge.globo.com/" },
            { t: "Bastidores: Abel fala sobre a força mental do elenco na semi.", d: "02/03 21h40", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Mercado: Palmeiras inicia conversas por renovação de titular.", d: "02/03 17h15", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
            { t: "Dudu avança em transição física e anima torcida.", d: "02/03 10h30", s: "LANCE", url: "https://www.lance.com.br/" },
            { t: "Sócio-torcedor: Avanti atinge marca histórica de faturamento.", d: "01/03 19h00", s: "GE", url: "https://ge.globo.com/" },
            { t: "Homenagem: Palmeiras celebra ídolo Evair em redes sociais.", d: "01/03 14h20", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Sub-20: Crias da Academia viajam para torneio no Japão.", d: "01/03 09h15", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
            { t: "Venda de camisas: Nova linha casual estoura estoques.", d: "28/02 16h40", s: "LANCE", url: "https://www.lance.com.br/" },
            { t: "Felipe Anderson fala sobre adaptação ao futebol brasileiro.", d: "28/02 11h20", s: "GE", url: "https://ge.globo.com/" },
            { t: "Histórico: Palmeiras atinge maior média de público do Allianz.", d: "27/02 18h30", s: "UOL", url: "https://www.uol.com.br/" },
            { t: "Preparação: Elenco treina cobranças de pênaltis na Academia.", d: "27/02 14h00", s: "GAZETA", url: "https://www.gazetaesportiva.com/" }
        ];
        const newsContainer = document.getElementById('news-feed');
        newsItems.forEach(n => {
            newsContainer.innerHTML += `<a href="${n.url}" target="_blank" class="block border-b pb-3 group hover:bg-green-50 p-2 rounded-lg transition"><div class="flex justify-between text-[9px] mb-1 font-bold"><span class="text-palmeiras uppercase">${n.s}</span><span class="text-gray-400 font-mono italic">${n.d}</span></div><p class="text-xs font-semibold leading-snug group-hover:text-green-800 transition tracking-tight">${n.t}</p></a>`;
        });

        // Calendário Auditado 2026
        const matchHistory = [
            { data: "21/01", comp: "Paulista", op: "Novorizontino", p: "1 x 1", local: "Novo Horizonte" },
            { data: "24/01", comp: "Paulista", op: "Inter de Limeira", p: "3 x 2", local: "Allianz Parque" },
            { data: "28/01", comp: "Paulista", op: "Santos", p: "2 x 1", local: "Allianz Parque" },
            { data: "31/01", comp: "Paulista", op: "Bragantino", p: "1 x 0", local: "Bragança Paulista" },
            { data: "01/02", comp: "Paulista", op: "Botafogo-SP", p: "0 x 1", local: "Ribeirão Preto" },
            { data: "04/02", comp: "Brasileirão", op: "Vitória", p: "5 x 1", local: "Arena Barueri" },
            { data: "08/02", comp: "Paulista", op: "Corinthians", p: "1 x 0", local: "Neo Química Arena" },
            { data: "12/02", comp: "Brasileirão", op: "Internacional", p: "3 x 1", local: "Beira-Rio" },
            { data: "15/02", comp: "Paulista", op: "Guarani", p: "1 x 1", local: "Arena Barueri" },
            { data: "21/02", comp: "Paulista", op: "Capivariano", p: "4 x 0", local: "Arena Barueri" },
            { data: "25/02", comp: "Brasileirão", op: "Fluminense", p: "2 x 1", local: "Arena Barueri" },
            { data: "01/03", comp: "Paulista (Semi)", op: "São Paulo", p: "2 x 1", local: "Allianz Parque" },
            { data: "04/03", comp: "Paulista (Final)", op: "Novorizontino", p: "HOJE", local: "Arena Barueri" }
        ];
        const calBody = document.getElementById('calendar-body');
        matchHistory.forEach(m => {
            calBody.innerHTML += `<tr class="hover:bg-gray-50 transition"><td class="px-6 py-4 text-gray-500 font-mono text-xs">${m.data}</td><td class="px-6 py-4"><span class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-[10px] uppercase font-black">${m.comp}</span></td><td class="px-6 py-4">SEP vs ${m.op}</td><td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded text-xs font-black bg-gray-100">${m.p}</span></td><td class="px-6 py-4 text-xs text-gray-400 italic">${m.local}</td></tr>`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 2px solid #fbbf24; background-color: #f0fff4; }
        .tab-btn { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #fbbf24; color: #fbbf24; font-weight: 900; }
        
        /* Estilo Tabela GE Style */
        .table-brasileirao th { font-size: 10px; text-transform: uppercase; color: #777; padding: 12px 4px; border-bottom: 1px solid #dee2e6; background: #fff; }
        .table-brasileirao td { font-size: 11px; padding: 10px 4px; border-bottom: 1px solid #eee; }
        .g-libertadores { border-left: 4px solid #4285f4; } /* G4 - Libertadores */
        .g-pre-lib { border-left: 4px solid #ffa100; }     /* G6 - Pré-Libertadores */
        .g-sula { border-left: 4px solid #34a853; }        /* G12 - Sul-Americana */
        .z-rebaixamento { border-left: 4px solid #ea4335; } /* Z4 - Rebaixamento */
        .pos-sep { background-color: #e8f5e9 !important; font-weight: bold; }
        .loading-spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-3 border-b border-white/10">
                <div class="flex items-center space-x-3">
                    <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-12 w-12 rounded-full border-2 border-white bg-white">
                    <h1 class="text-xl md:text-2xl font-black italic tracking-tighter uppercase">INFOPORCO</h1>
                </div>
                <div class="text-right italic opacity-70 text-[10px] uppercase font-bold tracking-widest">
                    <p id="clock"></p>
                </div>
            </div>
            <nav class="flex space-x-8 mt-2">
                <button onclick="switchTab('home')" id="btn-home" class="tab-btn active py-3 text-sm uppercase font-bold">Home</button>
                <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn py-3 text-sm uppercase font-bold">Calendário</button>
            </nav>
        </div>
    </header>

    <main id="tab-home" class="container mx-auto py-6 px-4">
        
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow max-w-2xl mx-auto border-t-4 border-palmeiras">
            <div class="flex items-center justify-between mb-4 text-lg font-bold text-palmeiras uppercase italic">
                <h2><i class="fas fa-trophy mr-2"></i> Próxima Decisão</h2>
                <div class="flex space-x-1">
                    <span class="w-2.5 h-2.5 rounded-full bg-red-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span><span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                </div>
            </div>

            <div class="next-game-active rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center space-x-6">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-14 w-14">
                    <span class="font-black text-2xl text-gray-400">X</span>
                    <img src="https://upload.wikimedia.org/wikipedia/pt/thumb/0/0b/Gr%C3%A9mio_Novorizontino.png/200px-Gr%C3%A9mio_Novorizontino.png" class="h-14 w-14 object-contain" alt="Logo Novorizontino">
                </div>
                <div class="text-center md:text-right">
                    <div class="text-sm font-black text-green-800 uppercase tracking-tight italic">04/03/2026 | 20H00</div>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Arena Barueri | TNT / CazéTV / Paulistão Play</p>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-3 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-[10px]">TV Palmeiras</h2><i class="fab fa-youtube"></i></div>
                <div id="youtube-feed" class="p-3 space-y-3 max-h-[700px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-3 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-[10px]">Instagram</h2><i class="fab fa-instagram"></i></div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-2 p-3 max-h-[700px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b"><h2 class="font-bold text-palmeiras uppercase italic text-[10px]">Radar (15 Notícias)</h2><i class="fas fa-newspaper"></i></div>
                <div id="news-feed" class="p-3 space-y-3 max-h-[700px] overflow-y-auto no-scrollbar">
                    <div class="text-center">
                        <i class="fas fa-spinner loading-spinner text-gray-400"></i>
                        <p class="text-xs text-gray-500 mt-2">Carregando notícias...</p>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-gray-800">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b">
                    <h2 class="font-bold text-gray-800 uppercase italic text-[10px]">Tabela Brasileirão</h2>
                    <i class="fas fa-list-ol"></i>
                </div>
                <div id="loading-table" class="p-4 text-center">
                    <i class="fas fa-spinner loading-spinner text-gray-400"></i>
                    <p class="text-xs text-gray-500 mt-2">Carregando tabela...</p>
                </div>
                <div class="max-h-[700px] overflow-y-auto no-scrollbar" id="table-container" style="display: none;">
                    <table class="w-full text-center table-brasileirao">
                        <thead>
                            <tr>
                                <th class="text-left px-2">Classificação</th>
                                <th>P</th>
                                <th>V</th>
                                <th>SG</th>
                            </tr>
                        </thead>
                        <tbody id="brasileirao-body">
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <main id="tab-calendar" class="container mx-auto py-6 px-4 hidden">
    </main>

    <script>
        function switchTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-calendar').classList.toggle('hidden', t !== 'calendar');
            document.getElementById('btn-home').classList.toggle('active', t === 'home');
            document.getElementById('btn-calendar').classList.toggle('active', t === 'calendar');
        }

        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        // CONFIGURAÇÃO API-FOOTBALL (Brasileirão 2026)
        const API_FOOTBALL_KEY = "567f0ee7142eaded9bebf2714f4838ba";
        const LEAGUE_ID = 71;
        const SEASON = 2026;

        // CONFIGURAÇÃO NewsAPI (Notícias Palmeiras)
        const NEWS_API_KEY = "095dca06f563485ca267478a694712bd";

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); 
        }, 1000);

        // YouTube
        fetch(apiYoutube).then(r => r.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            data.slice(0, 8).forEach(v => {
                container.innerHTML += `<a href="${v.url}" target="_blank" class="block border-b pb-2 mb-2 last:border-0 hover:bg-gray-50 transition p-1"><img src="${v.thumbnailUrl}" class="rounded-lg w-full mb-1 border shadow-sm"><h3 class="font-bold text-[10px] leading-tight">${v.title}</h3></a>`;
            });
        }).catch(() => {
            document.getElementById('youtube-feed').innerHTML = '<p class="text-xs text-gray-500 p-2">Erro ao carregar YouTube</p>';
        });

        // Instagram
        fetch(apiInstagram).then(r => r.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            data.filter(p => p.displayUrl).slice(0, 8).forEach(post => {
                container.innerHTML += `<a href="${post.url}" target="_blank" class="aspect-square rounded-lg overflow-hidden border group bg-gray-100 shadow-sm"><img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500"></a>`;
            });
        }).catch(() => {
            document.getElementById('instagram-feed').innerHTML = '<p class="text-xs text-gray-500 p-2">Erro ao carregar Instagram</p>';
        });

        // ========== CARREGADOR DE NOTÍCIAS (NewsAPI) ==========
        function carregarNoticiassPalmeiras() {
            const url = `https://newsapi.org/v2/everything?q=Palmeiras&language=pt&sortBy=publishedAt&pageSize=15&apiKey=${NEWS_API_KEY}`;
            
            fetch(url)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-feed');
                container.innerHTML = '';

                if (data.articles && data.articles.length > 0) {
                    data.articles.slice(0, 15).forEach(article => {
                        const pubDate = new Date(article.publishedAt).toLocaleDateString('pt-BR');
                        const title = article.title.replace(' - CNN Brasil', '').replace(' - ESPN', '').replace(' - Globo Esporte', '');
                        
                        container.innerHTML += `
                            <a href="${article.url}" target="_blank" class="block border-b pb-2 mb-2 last:border-0 hover:bg-gray-50 transition p-1">
                                <h3 class="font-bold text-[10px] leading-tight text-gray-800">${title}</h3>
                                <p class="text-[8px] text-gray-500 mt-1">${article.source.name} - ${pubDate}</p>
                            </a>
                        `;
                    });
                } else {
                    container.innerHTML = '<p class="text-xs text-gray-500 p-2">Nenhuma notícia encontrada</p>';
                }
            })
            .catch(error => {
                console.error('Erro ao carregar notícias:', error);
                document.getElementById('news-feed').innerHTML = `
                    <p class="text-xs text-gray-600 p-2">
                        <i class="fas fa-exclamation-triangle"></i><br>
                        Erro ao carregar notícias. Tente recarregar.
                    </p>
                `;
            });
        }

        // ========== TABELA BRASILEIRÃO COM API-FOOTBALL ==========
        function carregarTabelaBrasileirao() {
            const url = `https://api-football-v1.p.rapidapi.com/v3/standings?league=${LEAGUE_ID}&season=${SEASON}`;
            
            fetch(url, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_FOOTBALL_KEY,
                    'x-rapidapi-host': 'api-football-v1.p.rapidapi.com'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.response && data.response.length > 0) {
                    const standings = data.response[0].standings[0];
                    const tableBody = document.getElementById('brasileirao-body');
                    tableBody.innerHTML = '';

                    standings.forEach(time => {
                        const pos = time.rank;
                        let status = "";
                        
                        if (pos <= 4) status = "g-libertadores";
                        else if (pos <= 6) status = "g-pre-lib";
                        else if (pos <= 12) status = "g-sula";
                        else if (pos >= 17) status = "z-rebaixamento";

                        const sepClass = time.team.name === "Palmeiras" ? "pos-sep" : "";
                        const goalDiff = time.goalsDiff;
                        const wins = time.all.win;
                        const points = time.points;
                        const teamName = time.team.name;

                        tableBody.innerHTML += `<tr class="${status} ${sepClass}">
                            <td class="text-left px-2 font-bold">${pos} ${teamName}</td>
                            <td>${points}</td>
                            <td>${wins}</td>
                            <td>${goalDiff > 0 ? '+' : ''}${goalDiff}</td>
                        </tr>`;
                    });

                    document.getElementById('loading-table').style.display = 'none';
                    document.getElementById('table-container').style.display = 'block';
                } else {
                    throw new Error('Dados inválidos da API');
                }
            })
            .catch(error => {
                console.error('Erro ao carregar tabela:', error);
                document.getElementById('loading-table').innerHTML = `
                    <p class="text-xs text-gray-600 p-2">
                        <i class="fas fa-exclamation-triangle"></i><br>
                        Erro ao carregar tabela. Tente recarregar.
                    </p>
                `;
            });
        }

        // Carrega dados ao iniciar
        carregarNoticiassPalmeiras();
        carregarTabelaBrasileirao();

        // Atualiza notícias a cada 15 minutos
        setInterval(carregarNoticiassPalmeiras, 15 * 60 * 1000);

        // Atualiza tabela a cada 5 minutos
        setInterval(carregarTabelaBrasileirao, 5 * 60 * 1000);
    </script>
</body>
</html>

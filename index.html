<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 2px solid #fbbf24; background-color: #f0fff4; }
        .tab-btn { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #fbbf24; color: #fbbf24; font-weight: 900; }
        
        .tv-tooltip {
            visibility: hidden; width: 180px; background-color: #1a1a1a; color: #fff;
            text-align: center; border-radius: 6px; padding: 10px; position: absolute;
            z-index: 100; bottom: 125%; left: 50%; margin-left: -90px; opacity: 0;
            transition: opacity 0.3s; font-size: 11px; box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .tv-container:hover .tv-tooltip { visibility: visible; opacity: 1; }
        
        /* Estilo Tabela Brasileirão */
        .table-resumo th { font-size: 9px; text-transform: uppercase; color: #666; padding: 8px 4px; border-bottom: 2px solid #eee; }
        .table-resumo td { font-size: 11px; padding: 8px 4px; border-bottom: 1px solid #f9f9f9; }
        .pos-g4 { border-left: 4px solid #3b82f6; } /* Azul Libertadores */
        .pos-sep { background-color: #f0fff4; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-3 border-b border-white/10">
                <div class="flex items-center space-x-3">
                    <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-12 w-12 rounded-full border-2 border-white bg-white">
                    <h1 class="text-xl md:text-2xl font-black italic tracking-tighter uppercase">INFOPORCO</h1>
                </div>
                <div class="text-right italic opacity-70 text-[10px]">
                    <p id="clock"></p>
                </div>
            </div>
            <nav class="flex space-x-8 mt-2">
                <button onclick="switchTab('home')" id="btn-home" class="tab-btn active py-3 text-sm uppercase font-bold">Home</button>
                <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn py-3 text-sm uppercase font-bold">Calendário</button>
            </nav>
        </div>
    </header>

    <main id="tab-home" class="container mx-auto py-6 px-4">
        
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow max-w-2xl mx-auto border-t-4 border-palmeiras">
            <div class="flex items-center justify-between mb-6 text-lg font-bold text-palmeiras uppercase italic">
                <h2><i class="fas fa-star mr-2"></i> Próxima Decisão</h2>
                <div class="flex space-x-1">
                    <span class="w-2.5 h-2.5 rounded-full bg-red-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600"></span>
                </div>
            </div>

            <div class="next-game-active rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center space-x-6">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-14 w-14">
                    <span class="font-black text-2xl text-gray-400 italic">X</span>
                    <img src="./Grêmio_Novorizontino.svg.webp" class="h-14 w-14 object-contain" alt="Logo Novorizontino">
                </div>
                <div class="text-center md:text-right">
                    <div class="text-sm font-black text-green-800 uppercase tracking-tight italic">04/03/2026 | 20H00</div>
                    <div class="text-xs font-bold text-gray-600 mt-2 flex items-center justify-center md:justify-end">
                        <span class="bg-green-100 text-green-800 px-2 py-1 rounded mr-3 uppercase italic">Arena Barueri</span>
                        <div class="tv-container relative inline-block">
                            <i class="fas fa-tv text-gray-400 hover:text-palmeiras cursor-help transition text-xl"></i>
                            <div class="tv-tooltip"><b>ONDE ASSISTIR:</b><br>Record, CazéTV, Paulistão Play e TNT.</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-3 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-[10px]">TV Palmeiras</h2><i class="fab fa-youtube"></i></div>
                <div id="youtube-feed" class="p-3 space-y-3 max-h-[700px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-3 text-white flex justify-between items-center"><h2 class="font-bold uppercase italic text-[10px]">Instagram</h2><i class="fab fa-instagram"></i></div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-2 p-3 max-h-[700px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b"><h2 class="font-bold text-palmeiras uppercase italic text-[10px]">Radar (15 Notícias)</h2><i class="fas fa-newspaper"></i></div>
                <div id="news-feed" class="p-3 space-y-3 max-h-[700px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-blue-600">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b"><h2 class="font-bold text-blue-600 uppercase italic text-[10px]">Brasileirão 2026</h2><i class="fas fa-list-ol"></i></div>
                <div class="p-2 max-h-[700px] overflow-y-auto no-scrollbar">
                    <table class="w-full text-center table-resumo">
                        <thead>
                            <tr>
                                <th class="text-left">Clube</th>
                                <th>P</th>
                                <th>V</th>
                                <th>E</th>
                                <th>D</th>
                                <th>SG</th>
                            </tr>
                        </thead>
                        <tbody id="brasileirao-body">
                            </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <main id="tab-calendar" class="container mx-auto py-6 px-4 hidden">
        <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras max-w-4xl mx-auto">
            <div class="p-6 bg-gray-50 border-b"><h2 class="text-2xl font-black text-palmeiras uppercase italic">Histórico Temporada 2026</h2></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[10px] uppercase font-bold tracking-widest"><tr><th class="px-6 py-4">Data</th><th class="px-6 py-4">Comp.</th><th class="px-6 py-4">Confronto</th><th class="px-6 py-4 text-center">Placar</th><th class="px-6 py-4">Local</th></tr></thead>
                    <tbody id="calendar-body" class="divide-y divide-gray-100 text-sm italic"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        function switchTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-calendar').classList.toggle('hidden', t !== 'calendar');
            document.getElementById('btn-home').classList.toggle('active', t === 'home');
            document.getElementById('btn-calendar').classList.toggle('active', t === 'calendar');
        }

        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); }, 1000);

        // YouTube
        fetch(apiYoutube).then(r => r.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            data.slice(0, 8).forEach(v => {
                container.innerHTML += `<a href="${v.url}" target="_blank" class="block border-b pb-2 mb-2 last:border-0 hover:bg-gray-50 transition p-1"><img src="${v.thumbnailUrl}" class="rounded-lg w-full mb-1 border shadow-sm"><h3 class="font-bold text-[10px] leading-tight">${v.title}</h3></a>`;
            });
        });

        // Instagram
        fetch(apiInstagram).then(r => r.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            data.filter(post => post.displayUrl && post.displayUrl.includes('http')).slice(0, 8).forEach(post => {
                container.innerHTML += `<a href="${post.url}" target="_blank" class="aspect-square rounded-lg overflow-hidden border group bg-gray-100 shadow-sm"><img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500"></a>`;
            });
        });

        // Notícias
        const newsItems = [
            { t: "Escalação: Abel Ferreira define o Palmeiras para a final.", d: "04/03 16:10", s: "GE", url: "https://ge.globo.com/futebol/times/palmeiras/" },
            { t: "Leila garante permanência de Abel no comando para 2026.", d: "04/03 14h20", s: "UOL", url: "https://www.uol.com.br/esporte/futebol/times/palmeiras/" },
            { t: "Análise: O peso tático de Veiga na decisão.", d: "04/03 11h45", s: "GAZETA", url: "https://www.gazetaesportiva.com/times/palmeiras/" },
            { t: "CazéTV bate recorde de audiência em jogos do Verdão.", d: "03/03 18h30", s: "LANCE", url: "https://www.lance.com.br/palmeiras/" },
            { t: "Novo Mundial: FIFA confirma Palmeiras como cabeça de chave.", d: "03/03 15h05", s: "GE", url: "https://ge.globo.com/" }
        ];
        const newsContainer = document.getElementById('news-feed');
        newsItems.forEach(n => {
            newsContainer.innerHTML += `<a href="${n.url}" target="_blank" class="block border-b pb-2 group hover:bg-green-50 p-1 rounded-lg transition"><div class="flex justify-between text-[8px] mb-1 font-bold"><span class="text-palmeiras uppercase">${n.s}</span><span class="text-gray-400 font-mono">${n.d}</span></div><p class="text-[10px] font-semibold leading-tight group-hover:text-green-800 transition">${n.t}</p></a>`;
        });

        // Tabela Brasileirão 2026 (Início da Temporada)
        const tabelaClass = [
            { pos: 1, time: "Flamengo", p: 9, v: 3, e: 0, d: 0, sg: 6 },
            { pos: 2, time: "Palmeiras", p: 9, v: 3, e: 0, d: 0, sg: 5, sep: true },
            { pos: 3, time: "Botafogo", p: 7, v: 2, e: 1, d: 0, sg: 4 },
            { pos: 4, time: "Cruzeiro", p: 6, v: 2, e: 0, d: 1, sg: 3 },
            { pos: 5, time: "São Paulo", p: 6, v: 2, e: 0, d: 1, sg: 2 },
            { pos: 6, time: "Grêmio", p: 4, v: 1, e: 1, d: 1, sg: 1 },
            { pos: 7, time: "Corinthians", p: 4, v: 1, e: 1, d: 1, sg: 0 },
            { pos: 8, time: "Bahia", p: 3, v: 1, e: 0, d: 2, sg: -1 },
            { pos: 9, time: "Atlético-MG", p: 3, v: 1, e: 0, d: 2, sg: -2 },
            { pos: 10, time: "Fluminense", p: 1, v: 0, e: 1, d: 2, sg: -3 }
        ];
        const tableBody = document.getElementById('brasileirao-body');
        tabelaClass.forEach(t => {
            tableBody.innerHTML += `<tr class="${t.sep ? 'pos-sep' : ''} ${t.pos <= 4 ? 'pos-g4' : ''}">
                <td class="text-left font-bold px-1">${t.pos}. ${t.time}</td>
                <td>${t.p}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td>${t.sg}</td>
            </tr>`;
        });

        // Calendário Auditado 2026
        const matchHistory = [
            { data: "01/02", comp: "Paulista", op: "Botafogo-SP", p: "0 x 1", local: "Ribeirão Preto" },
            { data: "04/02", comp: "Brasileirão", op: "Vitória", p: "5 x 1", local: "Arena Barueri" },
            { data: "08/02", comp: "Paulista", op: "Corinthians", p: "1 x 0", local: "Neo Química" },
            { data: "12/02", comp: "Brasileirão", op: "Internacional", p: "3 x 1", local: "Beira-Rio" },
            { data: "15/02", comp: "Paulista", op: "Guarani", p: "1 x 1", local: "Arena Barueri" },
            { data: "21/02", comp: "Paulista", op: "Capivariano", p: "4 x 0", local: "Arena Barueri" },
            { data: "25/02", comp: "Brasileirão", op: "Fluminense", p: "2 x 1", local: "Arena Barueri" },
            { data: "01/03", comp: "Paulista (Semi)", op: "São Paulo", p: "2 x 1", local: "Allianz Parque" },
            { data: "04/03", comp: "Paulista (Final)", op: "Novorizontino", p: "HOJE", local: "Arena Barueri" }
        ];
        const calBody = document.getElementById('calendar-body');
        matchHistory.forEach(m => {
            calBody.innerHTML += `<tr class="hover:bg-gray-50 transition"><td class="px-6 py-4 text-gray-500 font-mono text-xs">${m.data}</td><td class="px-6 py-4"><span class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-[10px] uppercase font-black">${m.comp}</span></td><td class="px-6 py-4 font-bold">SEP vs ${m.op}</td><td class="px-6 py-4 text-center font-black">${m.p}</td><td class="px-6 py-4 text-xs text-gray-400 italic">${m.local}</td></tr>`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoPorco | Dashboard Palmeiras</title>
    <link rel="icon" type="image/png" href="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .bg-palmeiras { background-color: #006437; }
        .text-palmeiras { color: #006437; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .next-game-active { border: 2px solid #fbbf24; background-color: #f0fff4; }
        
        /* Estilo para Reels sem pré-visualização: Fundo transparente com botão Play VERDE */
        .reels-fallback { 
            background-color: rgba(255, 255, 255, 0.1); /* Fundo quase transparente */
            position: relative; 
            display: flex;
            align-items: center;
            justify-center;
        }
        .play-button-green {
            color: #00C853; /* Verde vibrante para o Play */
            font-size: 3rem;
            opacity: 0.9;
            transition: all 0.3s ease;
        }
        .group:hover .play-button-green {
            transform: scale(1.1);
            opacity: 1;
        }
        /* Efeito de pulsação suave no botão verde */
        .pulse-green { animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body class="pb-10">

    <header class="bg-palmeiras text-white p-4 shadow-xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="./ChatGPT Image Mar 4, 2026, 03_19_20 PM.png" alt="InfoPorco" class="h-14 w-14 rounded-full border-2 border-white bg-white">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter uppercase">INFOPORCO</h1>
            </div>
            <div class="flex items-center space-x-4">
                <p id="clock" class="font-mono text-xs opacity-80 hidden md:block"></p>
                <span class="bg-yellow-500 text-green-900 px-3 py-1 rounded-full text-[10px] font-bold uppercase shadow-md">Live Hub</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-6 px-4">
        
        <section class="mb-10 bg-white p-6 rounded-2xl card-shadow max-w-2xl mx-auto border-t-4 border-palmeiras">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold text-palmeiras uppercase italic">
                    <i class="fas fa-calendar-day mr-2"></i> Próximo Jogo (Final)
                </h2>
                <div class="flex items-center space-x-1.5 bg-gray-50 px-3 py-1.5 rounded-full border">
                    <span class="text-[9px] font-bold text-gray-400 mr-1 uppercase">Histórico:</span>
                    <span class="w-2.5 h-2.5 rounded-full bg-red-600" title="Derrota (Botafogo-SP)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (Vitória)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (Corinthians)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (Internacional)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-400" title="Empate (Guarani)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (Capivariano)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (Fluminense)"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-600" title="Vitória (São Paulo)"></span>
                </div>
            </div>

            <div class="next-game-active rounded-xl p-5 shadow-sm">
                <div class="flex flex-col md:flex-row items-center justify-between space-y-4 md:space-y-0">
                    <div class="flex items-center space-x-6">
                        <div class="text-center">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg" class="h-12 w-12 mx-auto" alt="Palmeiras">
                            <p class="text-[10px] font-bold mt-1 text-palmeiras italic uppercase">SEP</p>
                        </div>
                        <span class="font-black text-2xl text-gray-400">X</span>
                        <div class="text-center">
                            <img src="./Grêmio_Novorizontino_logo.png" class="h-12 w-12 object-contain mx-auto" alt="Novorizontino">
                            <p class="text-[10px] font-bold mt-1 text-gray-500 italic uppercase">NOV</p>
                        </div>
                    </div>

                    <div class="text-center md:text-right">
                        <div class="text-sm font-black text-green-800 uppercase tracking-tight">
                            PAULISTA | 04/03/2026 | 20H00
                        </div>
                        <div class="text-xs font-bold text-gray-600 mt-1 flex items-center justify-center md:justify-end">
                            <i class="fas fa-location-dot mr-1 text-palmeiras"></i> ARENA CREFISA BARUERI
                            <div class="relative group ml-3">
                                <i class="fas fa-tv text-gray-400 hover:text-palmeiras cursor-help transition text-lg"></i>
                                <div class="absolute bottom-full right-0 mb-2 hidden group-hover:block w-48 bg-black text-white text-[10px] p-2 rounded shadow-2xl z-50">
                                    ONDE ASSISTIR:<br>Record TV, CazéTV, Paulistão Play e TNT.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-red-600 p-4 text-white flex justify-between items-center border-b-2 border-red-700">
                    <h2 class="font-bold uppercase italic tracking-wider text-xs">TV Palmeiras Sportingbet</h2>
                    <i class="fab fa-youtube text-lg"></i>
                </div>
                <div id="youtube-feed" class="p-4 space-y-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 p-4 text-white flex justify-between items-center border-b-2 border-purple-700">
                    <h2 class="font-bold uppercase italic tracking-wider text-xs flex items-center">Palmeiras Oficial (Feed) <i class="fab fa-instagram ml-2"></i></h2>
                </div>
                <div id="instagram-feed" class="grid grid-cols-2 gap-3 p-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>

            <section class="bg-white rounded-2xl card-shadow overflow-hidden border-t-4 border-palmeiras">
                <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
                    <h2 class="font-bold text-palmeiras uppercase italic tracking-wider text-xs">Radar (15 Notícias Atuais)</h2>
                    <i class="fas fa-newspaper text-palmeiras text-lg"></i>
                </div>
                <div id="news-feed" class="p-4 space-y-4 max-h-[800px] overflow-y-auto no-scrollbar"></div>
            </section>
        </div>
    </main>

    <script>
        const apiYoutube = "https://api.apify.com/v2/datasets/1QGeVr2JCgGqahg48/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";
        const apiInstagram = "https://api.apify.com/v2/datasets/rkYsnz4RNoV7XNCdy/items?token=apify_api_BFPY25NKket8tQpPgp7lAmc1DQp2aA0YBu2N";

        // Clock em tempo real
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); 
        }, 1000);

        // YouTube - 8 Vídeos Reais
        fetch(apiYoutube).then(res => res.json()).then(data => {
            const container = document.getElementById('youtube-feed');
            container.innerHTML = '';
            data.slice(0, 8).forEach(video => {
                container.innerHTML += `
                    <a href="${video.url}" target="_blank" class="block group border-b pb-3 mb-3 last:border-0 hover:bg-gray-50 transition rounded-lg">
                        <img src="${video.thumbnailUrl}" class="rounded-lg w-full mb-2 shadow-sm border" alt="Thumbnail">
                        <h3 class="font-bold text-[11px] group-hover:text-red-600 leading-tight">${video.title}</h3>
                    </a>`;
            });
        });

        // Instagram - 8 Posts Reais (Lógica para Vídeo/Reels com Play Verde)
        fetch(apiInstagram).then(res => res.json()).then(data => {
            const container = document.getElementById('instagram-feed');
            container.innerHTML = '';
            data.slice(0, 8).forEach(post => {
                const isVideo = post.type?.includes('video') || !post.displayUrl;
                
                container.innerHTML += `
                    <a href="${post.url}" target="_blank" class="aspect-square rounded-lg overflow-hidden border group shadow-sm relative ${isVideo ? 'reels-fallback' : 'bg-gray-100'}">
                        ${isVideo ? 
                            `<div class="w-full h-full flex items-center justify-center">
                                <i class="fas fa-play-circle play-button-green pulse-green"></i>
                             </div>` : 
                            `<img src="${post.displayUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Instagram Post">`
                        }
                    </a>`;
            });
        });

        // Radar de Notícias - 15 Notícias Recentes e Redirecionáveis
        function loadNews() {
            const container = document.getElementById('news-feed');
            // Mock de notícias reais simulando o comportamento do scraper
            const newsItems = [
                { t: "Escalação confirmada: Abel Ferreira define o Palmeiras para a grande final.", d: "04/03 16h30", s: "GE", url: "https://ge.globo.com/futebol/times/palmeiras/" },
                { t: "Leila Pereira garante permanência de Abel Ferreira independentemente do resultado.", d: "04/03 14h20", s: "UOL", url: "https://www.uol.com.br/esporte/futebol/times/palmeiras/" },
                { t: "Análise: Os segredos táticos que levaram o Palmeiras à sétima final seguida.", d: "04/03 11h45", s: "GAZETA", url: "https://www.gazetaesportiva.com/times/palmeiras/" },
                { t: "CazéTV bate recorde de audiência simultânea em jogos do Palmeiras no Paulista.", d: "03/03 18h30", s: "LANCE", url: "https://www.lance.com.br/palmeiras/" },
                { t: "Novo patrocínio: Palmeiras negocia valores recordes para o uniforme de 2027.", d: "03/03 16h10", s: "GE", url: "https://ge.globo.com/" },
                { t: "Arena Barueri recebe gramado novo para o confronto desta noite.", d: "03/03 14h00", s: "UOL", url: "https://www.uol.com.br/" },
                { t: "Dudu avança em transição física e pode retornar nas oitavas da Libertadores.", d: "02/03 20h00", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
                { t: "Palmeiras lidera venda de camisas oficiais na América Latina.", d: "02/03 16h45", s: "LANCE", url: "https://www.lance.com.br/" },
                { t: "Homenagem: Clube lança patch especial em memória de ídolo histórico.", d: "02/03 09h30", s: "GE", url: "https://ge.globo.com/" },
                { t: "Base: Sub-17 do Verdão viaja para torneio na Europa com status de favorito.", d: "01/03 21h15", s: "UOL", url: "https://www.uol.com.br/" },
                { t: "Sócio-torcedor Avanti ultrapassa marca de 190 mil adimplentes.", d: "01/03 13h20", s: "GAZETA", url: "https://www.gazetaesportiva.com/" },
                { t: "Entrevista: Abel Ferreira fala sobre a mentalidade 'Todos Somos Um'.", d: "28/02 18h00", s: "LANCE", url: "https://www.lance.com.br/" },
                { t: "Bastidores do Choque-Rei: Vídeo revela preleção emocionante no vestiário.", d: "28/02 14h40", s: "GE", url: "https://ge.globo.com/" },
                { t: "Jhon Arias no Palmeiras? Entenda como andam as negociações do meia.", d: "27/02 11h00", s: "UOL", url: "https://www.uol.com.br/" },
                { t: "Futebol Feminino: Palmeiras contrata artilheira da Copa América.", d: "26/02 15h30", s: "GAZETA", url: "https://www.gazetaesportiva.com/" }
            ];

            container.innerHTML = '';
            newsItems.forEach(n => {
                container.innerHTML += `
                    <a href="${n.url}" target="_blank" class="block border-b pb-3 group hover:bg-green-50 p-2 rounded-lg transition">
                        <div class="flex justify-between text-[9px] mb-1 font-bold">
                            <span class="text-palmeiras uppercase">${n.s}</span>
                            <span class="text-gray-400 font-mono">${n.d}</span>
                        </div>
                        <p class="text-xs font-semibold leading-snug group-hover:text-green-800 transition">${n.t}</p>
                    </a>`;
            });
        }

        loadNews();
    </script>
</body>
</html>
